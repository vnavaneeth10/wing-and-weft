<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A1F2E"/>
      <stop offset="100%" stop-color="#9C6F2E"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- W letterform — Cormorant-style thin serifs suggested by geometry -->
  <text x="50" y="67" 
        font-family="Georgia, serif" 
        font-size="52" 
        font-weight="300"
        fill="#FAF6EF" 
        text-anchor="middle"
        letter-spacing="-2">W</text>
</svg>