<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ═══════════════════════════════════════════════
         PRIMARY SEO
    ═══════════════════════════════════════════════ -->
    <title>Wing & Weft — Draped in India's Finest Weaves | Silk, Cotton, Linen & More</title>

    <meta name="description"
      content="Wing & Weft curates authentic sarees directly from skilled weavers across India. Shop silk, cotton, linen, georgette & Kalamkari sarees — each piece a living tradition. Free shipping above ₹2000." />

    <meta name="keywords"
      content="sarees online India, silk sarees, cotton sarees, linen sarees, georgette sarees, Kalamkari sarees, curated sarees, authentic Indian sarees, sarees from weavers, artisan sarees India, buy sarees online, Indian weave sarees, traditional sarees, woven sarees India, saree collection" />

    <!-- Author & Robots -->
    <meta name="author" content="Wing & Weft" />

    <link rel="canonical" href="https://www.wingandweft.com/" />

    <meta name="google-site-verification" content="V3LL-4nZQhmhvLFPEvzsy6cm5OSsDadXaoB0ug4_p-E" />

    <!-- ═══════════════════════════════════════════════
         OPEN GRAPH — WhatsApp / Facebook / LinkedIn

    />

    <!-- ═══════════════════════════════════════════════
         STRUCTURED DATA — Organisation
    ═══════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Wing & Weft",
      "url": "https://www.wingandweft.com/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.wingandweft.com/logo@2x.png",
        "width": 512,
        "height": 512
      },
      "description": "Wing & Weft curates authentic sarees directly from skilled weavers across India — silk, cotton, linen, georgette and Kalamkari.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi", "Malayalam"]
      },
      "sameAs": [
        "https://www.instagram.com/wingandweft/"
      ]
    }
    </script>

    <!-- ═══════════════════════════════════════════════
         STRUCTURED DATA — WebSite
    ═══════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Wing & Weft",
      "url": "https://www.wingandweft.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.wingandweft.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════════
         STRUCTURED DATA — Store
    ═══════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Wing & Weft",
      "url": "https://www.wingandweft.com/",
      "image": "https://www.wingandweft.com/og-image.jpg",
      "description": "Authentic sarees curated directly from skilled weavers across India.",
      "priceRange": "₹₹₹",
      "currenciesAccepted": "INR",
      "paymentAccepted": "Credit Card, Debit Card, UPI, Net Banking",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Handwoven Sarees",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Silk Sarees" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Cotton Sarees" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Linen Sarees" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Georgette Sarees" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Kalamkari Sarees" } }
        ]
      }
    }
    </script>
  </head>
  <body>

  </body>
