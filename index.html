<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════════
         PRIMARY SEO
    ═══════════════════════════════════════════════ -->
    <title>Wing & Weft — Authentic Handwoven Sarees | Silk, Kanjivaram, Banarasi & Cotton</title>

    <meta name="description"
      content="Shop authentic handwoven sarees from master weavers across India. Pure Kanjivaram silk, Banarasi, Chanderi, cotton & heritage weaves — curated for the modern woman who honours tradition. Free shipping above ₹2000." />

    <meta name="keywords"
      content="handwoven sarees online, pure silk sarees, Kanjivaram sarees, Banarasi sarees, Chanderi sarees, cotton sarees, heritage weaves India, authentic Indian sarees, handloom sarees, silk sarees online India, buy sarees online, traditional Indian textiles, woven sarees, zari sarees, handcraft sarees" />

    <!-- Author & Robots -->
    <meta name="author" content="Wing & Weft" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <link rel="canonical" href="https://www.wingandweft.com/" />

    <meta name="google-site-verification" content="V3LL-4nZQhmhvLFPEvzsy6cm5OSsDadXaoB0ug4_p-E" />

    <!-- ═══════════════════════════════════════════════
         OPEN GRAPH — WhatsApp / Facebook / LinkedIn
         NOTE: og:image must be an absolute URL to a
         JPG or PNG (1200×630px, < 300 KB for WhatsApp).
    ═══════════════════════════════════════════════ -->
    <meta property="og:type"              content="website" />
    <meta property="og:site_name"         content="Wing & Weft" />
    <meta property="og:title"             content="Wing & Weft — Authentic Handwoven Sarees" />
    <meta property="og:description"       content="Pure Kanjivaram Silk, Banarasi, Chanderi & Cotton sarees from master weavers across India. Curated for the modern woman who honours heritage." />
    <meta property="og:url"               content="https://www.wingandweft.com/" />
    <meta property="og:image"             content="https://www.wingandweft.com/og-image.jpg" />
    <meta property="og:image:secure_url"  content="https://www.wingandweft.com/og-image.jpg" />
    <meta property="og:image:type"        content="image/jpeg" />
    <meta property="og:image:width"       content="1200" />
    <meta property="og:image:height"      content="630" />
    <meta property="og:image:alt"         content="Wing & Weft — Authentic Handwoven Sarees from master weavers across India" />
    <meta property="og:locale"            content="en_IN" />

    <!-- ═══════════════════════════════════════════════
         TWITTER CARD
    ═══════════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@wingandweft" />
    <meta name="twitter:title"       content="Wing & Weft — Authentic Handwoven Sarees" />
    <meta name="twitter:description" content="Pure Kanjivaram Silk, Banarasi, Chanderi & Cotton sarees from master weavers across India." />
    <meta name="twitter:image"       content="https://www.wingandweft.com/og-image.jpg" />
    <meta name="twitter:image:alt"   content="Wing & Weft — Authentic Handwoven Sarees" />

    <!-- ═══════════════════════════════════════════════
         FAVICONS & PWA
    ═══════════════════════════════════════════════ -->
    <link rel="icon"             href="/favicon.ico" sizes="any" />
    <link rel="icon"             href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest"         href="/site.webmanifest" />
    <meta name="theme-color"     content="#bc3d3e" />

    <!-- ═══════════════════════════════════════════════
         FONTS
    ═══════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ═══════════════════════════════════════════════
         STRUCTURED DATA — Organisation
    ═══════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Wing & Weft",
      "url": "https://www.wingandweft.com/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.wingandweft.com/logo@2x.png",
        "width": 512,
        "height": 512
      },
      "description": "Authentic handwoven sarees from master weavers across India. Pure Kanjivaram silk, Banarasi, Chanderi, cotton and heritage weaves.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi", "Tamil", "Telugu"]
      },
      "sameAs": [
        "https://www.instagram.com/wingandweft/"
      ]
    }
    </script>

    <!-- ═══════════════════════════════════════════════
         STRUCTURED DATA — WebSite (Google Sitelinks Search)
    ═══════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Wing & Weft",
      "url": "https://www.wingandweft.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.wingandweft.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════════
         STRUCTURED DATA — Store (helps Google Shopping)
    ═══════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Wing & Weft",
      "url": "https://www.wingandweft.com/",
      "image": "https://www.wingandweft.com/og-image.jpg",
      "description": "Authentic handwoven sarees from master weavers across India.",
      "priceRange": "₹₹₹",
      "currenciesAccepted": "INR",
      "paymentAccepted": "Credit Card, Debit Card, UPI, Net Banking",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Handwoven Sarees",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Kanjivaram Silk Sarees" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Banarasi Sarees" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Chanderi Sarees" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Handloom Cotton Sarees" } }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
