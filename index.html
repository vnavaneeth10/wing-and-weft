<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Wing &amp; Weft — Handwoven Sarees | Silk, Cotton &amp; Heritage Weaves</title>
    <meta name="description"
      content="Discover authentic handwoven sarees from master weavers across India. Pure silk, cotton, Banarasi &amp; more — curated for the modern woman who honours heritage. Free shipping above ₹2000." />
    <meta name="keywords"
      content="handwoven sarees, silk sarees, cotton sarees, Banarasi sarees, Indian heritage textiles, authentic sarees online" />
    <link rel="canonical" href="https://wing-and-weft.vercel.app/" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn previews) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Wing &amp; Weft" />
    <meta property="og:title"       content="Wing &amp; Weft — Handwoven Sarees" />
    <meta property="og:description" content="Authentic handwoven sarees from master weavers across India. Silk, cotton, Banarasi &amp; more." />
    <meta property="og:url"         content="https://wing-and-weft.vercel.app/" />
    <meta property="og:image"       content="https://wing-and-weft.vercel.app/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Wing &amp; Weft — Handwoven Sarees" />
    <meta name="twitter:description" content="Authentic handwoven sarees from master weavers across India." />
    <meta name="twitter:image"       content="https://wing-and-weft.vercel.app/og-image.jpg" />

    <!-- Favicons -->
    <link rel="icon"             href="/favicon.ico" sizes="any" />
    <link rel="icon"             href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest"         href="/site.webmanifest" />
    <meta name="theme-color"     content="#bc3d3e" />

    <!-- Performance: preconnect to Google Fonts before they're requested -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: load display-swap to prevent FOIT (flash of invisible text) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data — Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Wing & Weft",
      "url": "https://wing-and-weft.vercel.app/",
      "logo": "https://wing-and-weft.vercel.app/logo@2x.png",
      "description": "Authentic handwoven sarees from master weavers across India.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi"]
      },
      "sameAs": [
        "https://www.instagram.com/wingandweft/"
      ]
    }
    </script>

    <!-- Structured data — WebSite (enables Google sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Wing & Weft",
      "url": "https://wing-and-weft.vercel.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://wing-and-weft.vercel.app/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
